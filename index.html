<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Ricochet</title>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; color: white; overscroll-behavior: none; }
        
        .page { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background: radial-gradient(circle, #1a1a2e, #000); 
            padding: 15px; box-sizing: border-box; 
        }
        #menuPage { display: flex; }
        
        h1 { font-size: 2.2rem; color: #00e676; text-shadow: 0 0 10px #00e676; text-align: center; margin: 10px 0; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        
        button { padding: 12px 30px; cursor: pointer; border-radius: 20px; background: #00e676; border: none; font-weight: bold; color: #000; margin: 8px 0; width: 80%; max-width: 250px; font-size: 1rem; }
        
        /* OYUN ALANI DÜZENLEMESİ: Burayı küçülttük */
        #gamePage { 
            display: none; 
            width: 95vw;    /* Ekranın %95'i kadar genişlik */
            height: 90vh;   /* Ekranın %90'ı kadar yükseklik */
            margin: 5vh auto; /* Ortalamak için */
            position: relative; 
            touch-action: none;
            border: 2px solid #333; /* Kenarları belli olsun */
            border-radius: 10px;
        }
        canvas { 
            display: block; 
            background-color: #000; 
            width: 100%; 
            height: 100%; 
            border-radius: 8px;
        }
        
        #cikisBtn { position: absolute; top: -40px; right: 0; background: #555; color: white; padding: 5px 12px; border: none; z-index: 100; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="menuPage" class="page">
        <h1>NEON RICOCHET</h1>
        <button onclick="oyunaGit()">OYUNU BAŞLAT</button>
    </div>

    <div id="gamePage">
        <button id="cikisBtn" onclick="menuyeDon()">Menüden Çık</button>
        <canvas id="oyunAlani"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('oyunAlani');
        const ctx = canvas.getContext('2d');
        const menuPage = document.getElementById('menuPage');
        const gamePage = document.getElementById('gamePage');
        
        let ball = { x: 0, y: 0, dx: 4, dy: 4, r: 10 };
        let obstacles = [];
        let animationId;
        const wallThickness = 15;

        function oyunaGit() {
            menuPage.style.display = 'none';
            gamePage.style.display = 'block';

            // Canvas boyutunu CSS'ten gelen kutu boyutuna göre ayarla
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 5; 
            ball.dy = 5;
            
            generateObstacles();
            update();
        }

        function menuyeDon() {
            cancelAnimationFrame(animationId);
            gamePage.style.display = 'none';
            menuPage.style.display = 'flex';
        }

        function generateObstacles() {
            obstacles = [];
            for(let i = 0; i < 4; i++) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 60),
                    y: Math.random() * (canvas.height - 60),
                    w: 50, h: 20
                });
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Duvarlar
            ctx.fillStyle = "#ff00ff";
            ctx.fillRect(0, 0, canvas.width, wallThickness);
            ctx.fillRect(0, canvas.height - wallThickness, canvas.width, wallThickness);
            ctx.fillRect(0, 0, wallThickness, canvas.height);
            ctx.fillRect(canvas.width - wallThickness, 0, wallThickness, canvas.height);
            
            ctx.fillStyle = "#00FF00";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x - ball.r < wallThickness || ball.x + ball.r > canvas.width - wallThickness) ball.dx *= -1;
            if (ball.y - ball.r < wallThickness || ball.y + ball.r > canvas.height - wallThickness) ball.dy *= -1;
            
            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>

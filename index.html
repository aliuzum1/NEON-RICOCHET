<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Ricochet</title>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; color: white; overscroll-behavior: none; }
        
        .page { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a2e, #000); 
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        #menuPage { display: flex; }
        
        h1 { font-size: 2.2rem; color: #00e676; text-shadow: 0 0 10px #00e676; margin-bottom: 20px; text-align: center; }
        
        .control-group { margin-bottom: 20px; text-align: center; }
        input[type=range] { width: 180px; accent-color: #00e676; cursor: pointer; }
        
        button { padding: 12px 30px; cursor: pointer; border-radius: 20px; background: #00e676; border: none; font-weight: bold; color: #000; margin: 8px 0; width: 250px; }
        .secondary-btn { background: #555; color: white; }
        
        #gamePage { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Düzeltilmiş ve Şık X Butonu */
        #cikisBtn { 
            position: absolute; top: 20px; right: 20px; 
            width: 45px; height: 45px; border-radius: 50%; 
            background: rgba(255, 255, 255, 0.1); color: white; 
            border: 2px solid #fff; font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer; line-height: 1;
        }
    </style>
</head>
<body>

    <div id="menuPage" class="page">
        <h1>NEON RICOCHET</h1>
        <div class="control-group">
            <label>Oyun Hızı</label><br>
            <input type="range" id="hizSlider" min="2" max="10" step="0.5" value="4">
        </div>
        <button onclick="oyunaGit()">OYUNU BAŞLAT</button>
        <button class="secondary-btn" onclick="bilgiyeGit()">Hakkında</button>
    </div>

    <div id="infoPage" class="page" style="align-items: flex-start; justify-content: flex-start;">
        <h1>Hakkında</h1>
        <p>Neon Ricochet, refleks tabanlı bir fizik oyunudur. Engellere çarpmadan topu sektörerek en uzun süre hayatta kalmaya çalışın!</p>
        <button class="secondary-btn" style="width:100%;" onclick="menuyeDon()">Geri Dön</button>
    </div>

    <div id="gamePage">
        <button id="cikisBtn" onclick="menuyeDon()">✕</button>
        <canvas id="oyunAlani"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('oyunAlani');
        const ctx = canvas.getContext('2d');
        const menuPage = document.getElementById('menuPage');
        const infoPage = document.getElementById('infoPage');
        const gamePage = document.getElementById('gamePage');
        const hizSlider = document.getElementById('hizSlider');
        
        let ball = { x: 0, y: 0, dx: 4, dy: 4, r: 10 };
        let obstacles = [];
        let animationId;
        const wallThickness = 15;

        function oyunaGit() {
            menuPage.style.display = 'none';
            infoPage.style.display = 'none';
            gamePage.style.display = 'block';

            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            let speed = parseFloat(hizSlider.value);
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = speed; 
            ball.dy = speed;
            
            generateObstacles();
            update();
        }

        function bilgiyeGit() {
            menuPage.style.display = 'none';
            infoPage.style.display = 'flex';
        }

        function menuyeDon() {
            cancelAnimationFrame(animationId);
            gamePage.style.display = 'none';
            infoPage.style.display = 'none';
            menuPage.style.display = 'flex';
        }

        function generateObstacles() {
            obstacles = [];
            const colors = ['#FF5733', '#FFC300', '#33FF57', '#3357FF'];
            const rows = 4;
            const rowHeight = (canvas.height - 150) / rows;
            const blockW = 60;
            const blockH = 20;

            for(let row = 0; row < rows; row++) {
                let count = (row % 2 === 0) ? 1 : 3;
                let startY = 80 + (row * rowHeight);

                for(let i = 0; i < count; i++) {
                    let startX = (count === 1) ? (canvas.width / 2) - (blockW / 2) : (canvas.width / 4) * (i + 1) - (blockW / 2);
                    obstacles.push({
                        x: startX, y: startY, w: blockW, h: blockH,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Duvarlar
            ctx.fillStyle = "#ff00ff";
            ctx.fillRect(0, 0, canvas.width, wallThickness);
            ctx.fillRect(0, canvas.height - wallThickness, canvas.width, wallThickness);
            ctx.fillRect(0, 0, wallThickness, canvas.height);
            ctx.fillRect(canvas.width - wallThickness, 0, wallThickness, canvas.height);
            
            obstacles.forEach(o => { ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h); });
            
            ctx.fillStyle = "#00FF00";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Duvar çarpışma (itme yöntemi)
            if (ball.x - ball.r < wallThickness) { ball.x = wallThickness + ball.r; ball.dx *= -1; }
            else if (ball.x + ball.r > canvas.width - wallThickness) { ball.x = canvas.width - wallThickness - ball.r; ball.dx *= -1; }
            if (ball.y - ball.r < wallThickness) { ball.y = wallThickness + ball.r; ball.dy *= -1; }
            else if (ball.y + ball.r > canvas.height - wallThickness) { ball.y = canvas.height - wallThickness - ball.r; ball.dy *= -1; }
            
            // Engel Çarpışması (İtme yöntemi + Jitter)
            obstacles.forEach(obs => {
                let closestX = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
                let closestY = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
                let dist = Math.sqrt((ball.x - closestX)**2 + (ball.y - closestY)**2);
                
                if (dist < ball.r) {
                    let overlapX = Math.abs(ball.x - closestX);
                    let overlapY = Math.abs(ball.y - closestY);

                    // Topu engelin dışına it
                    if (overlapX > overlapY) {
                        ball.x = (ball.x < closestX) ? closestX - ball.r - 1 : closestX + ball.r + 1;
                        ball.dx *= -1;
                    } else {
                        ball.y = (ball.y < closestY) ? closestY - ball.r - 1 : closestY + ball.r + 1;
                        ball.dy *= -1;
                    }
                    ball.dx += (Math.random() - 0.5) * 0.2;
                    ball.dy += (Math.random() - 0.5) * 0.2;
                }
            });
            
            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>

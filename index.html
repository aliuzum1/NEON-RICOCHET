<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Ricochet</title>

    <style>
        /* Tam ekran kilidi */
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            width: 100%; 
            height: 100%; 
            overscroll-behavior: none;
            touch-action: none;
        }
        
        .page { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            width: 100vw; 
            height: 100dvh; 
            background: radial-gradient(circle, #1a1a2e, #000); 
        }
        #menuPage { display: flex; }
        
        /* Oyun sayfası: Taşmayı engellemek için box-sizing kullanıyoruz */
        #gamePage { 
            display: none; 
            width: 100vw; 
            height: 100dvh; 
            position: relative;
            box-sizing: border-box;
            background: #000;
        }
        
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Sığdırma garantisi */
        }
        
        #cikisBtn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            z-index: 100; 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.2); 
            color: white; 
            border: none; 
            border-radius: 5px;
        }
        
        button { padding: 15px 40px; cursor: pointer; border-radius: 20px; background: #00e676; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menuPage" class="page">
        <h1 style="color:#00e676;">NEON RICOCHET</h1>
        <button onclick="oyunaGit()">OYUNU BAŞLAT</button>
    </div>

    <div id="gamePage">
        <button id="cikisBtn" onclick="menuyeDon()">X</button>
        <canvas id="oyunAlani"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('oyunAlani');
        const ctx = canvas.getContext('2d');
        const menuPage = document.getElementById('menuPage');
        const gamePage = document.getElementById('gamePage');
        
        let ball = { x: 0, y: 0, dx: 5, dy: 5, r: 10 };
        let animationId;
        const wallThickness = 15;

        function oyunaGit() {
            menuPage.style.display = 'none';
            gamePage.style.display = 'block';

            // Ekran boyutlarını doğrudan canvas'a ata
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            update();
        }

        function menuyeDon() {
            cancelAnimationFrame(animationId);
            gamePage.style.display = 'none';
            menuPage.style.display = 'flex';
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Çerçeve (Duvarlar)
            ctx.fillStyle = "#ff00ff";
            ctx.fillRect(0, 0, canvas.width, wallThickness); // Üst
            ctx.fillRect(0, canvas.height - wallThickness, canvas.width, wallThickness); // Alt
            ctx.fillRect(0, 0, wallThickness, canvas.height); // Sol
            ctx.fillRect(canvas.width - wallThickness, 0, wallThickness, canvas.height); // Sağ
            
            // Top
            ctx.fillStyle = "#00FF00";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x - ball.r < wallThickness || ball.x + ball.r > canvas.width - wallThickness) ball.dx *= -1;
            if (ball.y - ball.r < wallThickness || ball.y + ball.r > canvas.height - wallThickness) ball.dy *= -1;
            
            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>

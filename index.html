<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Ricochet - Minimalist Fizik Oyunu</title>
    
    <!-- SEO -->
    <meta name="description" content="Neon Ricochet, minimalist fizik tabanlı arcade oyunu.">
    <meta name="keywords" content="neon, ricochet, arcade, fizik oyunu, tarayıcı oyunu">
    
    <!-- AdSense ve Geo -->
    <meta name="google-adsense-account" content="ca-pub-4346551902420368">
    <meta name="ads-txt" content="google.com, pub-4346551902420368, DIRECT, f08c47fec0942fa0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4346551902420368" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; background-color: #000; font-family: sans-serif; color: #ccc; touch-action: none; width: 100vw; height: 100vh; }
        .page { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a2e, #000); position: absolute; top: 0; left: 0; z-index: 10; }
        
        #gamePage { display: none; width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

        /* Yeni Arayüz Elemanları */
        #speedControl { position: absolute; top: 20px; left: 20px; z-index: 100; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        #exitBtn { position: absolute; top: 20px; right: 20px; z-index: 100; background: #ff5252; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        button { padding: 15px 40px; cursor: pointer; border-radius: 30px; background: #00e676; border: none; font-weight: bold; color: #000; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="menuPage" class="page">
        <h1>NEON RICOCHET</h1>
        
        <div class="ad-container" style="margin: 20px;">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-4346551902420368"
                 data-ad-slot="BURAYA_SLOT_ID_YAZ"
                 data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <button onclick="oyunaBasla()">START GAME</button>
    </div>

    <div id="gamePage">
        <div id="speedControl">
            Speed: <input type="range" id="speedSlider" min="2" max="15" value="6">
        </div>
        <button id="exitBtn" onclick="oyundanCik()">✕</button>
        <canvas id="oyunAlani"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('oyunAlani'), ctx = canvas.getContext('2d');
        const speedSlider = document.getElementById('speedSlider');
        let ball = { x: 0, y: 0, dx: 6, dy: 6, r: 8 };
        let obstacles = [], animationId;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);

        function generateObstacles() {
            obstacles = [];
            const rows = [1, 3, 2, 3];
            const rowHeight = canvas.height / 5;
            rows.forEach((count, rowIndex) => {
                const y = rowHeight * (rowIndex + 1);
                const spacing = canvas.width / (count + 1);
                const w = (count === 1 || count === 2) ? 80 : 20;
                const h = (count === 1 || count === 2) ? 20 : 80;
                for (let i = 0; i < count; i++) {
                    obstacles.push({ x: (spacing * (i + 1)) - (w / 2), y: y - (h / 2), w: w, h: h });
                }
            });
        }

        function update() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let speed = parseFloat(speedSlider.value);
            ball.x += ball.dx;
            obstacles.forEach(o => {
                if (ball.x + ball.r > o.x && ball.x - ball.r < o.x + o.w && ball.y + ball.r > o.y && ball.y - ball.r < o.y + o.h) {
                    ball.dx *= -1;
                }
            });
            if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.dx *= -1;
            
            ball.y += ball.dy;
            obstacles.forEach(o => {
                if (ball.x + ball.r > o.x && ball.x - ball.r < o.x + o.w && ball.y + ball.r > o.y && ball.y - ball.r < o.y + o.h) {
                    ball.dy *= -1;
                }
            });
            if (ball.y - ball.r < 0 || ball.y + ball.r > canvas.height) ball.dy *= -1;
            
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            obstacles.forEach(o => { ctx.fillStyle = '#00e676'; ctx.fillRect(o.x, o.y, o.w, o.h); });
            animationId = requestAnimationFrame(update);
        }

        function oyunaBasla() {
            document.getElementById('menuPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
            resizeCanvas();
            ball.x = canvas.width / 2; ball.y = canvas.height / 2;
            generateObstacles();
            update();
        }

        function oyundanCik() {
            cancelAnimationFrame(animationId);
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById('menuPage').style.display = 'flex';
        }
    </script>
</body>
</html>
